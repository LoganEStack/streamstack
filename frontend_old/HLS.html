<!DOCTYPE html>
<html>
<head>
  <title>HLS Test Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="background:#000; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
  <video id="video" controls style="width:80%; max-width:1280px;"></video>

  <script>
    const API = 'http://localhost:8000';
    const video = document.getElementById('video');

    async function loadVideo() {
      const params = new URLSearchParams(location.search);
      let publicId = params.get('id');

      if (!publicId) {
        const videos = await fetch(`${API}/browse`).then((r) => r.json());
        const match = videos.find((v) => v.title === 'Big Buck Bunny');
        publicId = (match || videos[0]).public_id;
      }

      const src = `${API}/media/${publicId}/master.m3u8`;

      if (Hls.isSupported()) {
        const hls = new Hls({ debug: true });
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          console.log('Manifest loaded, found ' + hls.levels.length + ' quality levels');
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = src;
      }
    }

    loadVideo();
  </script>
</body>
</html>
